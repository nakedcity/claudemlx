model_list:
  - model_name: local-model
    litellm_params:
      model: os.environ/LLM_MODEL
      api_base: os.environ/MLX_BASE_URL
      api_key: os.environ/OPENAI_API_KEY
      max_parallel_requests: 1
      timeout: 600
